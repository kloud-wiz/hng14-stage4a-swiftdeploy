services:
  app:
    image: kloudwiz-swiftdeploy:latest
    container_name: swiftdeploy-app
    environment:
      - MODE=stable
      - APP_VERSION=1.0.0
      - APP_PORT=3000
    expose:
      - "3000"
    networks:
      - swiftdeploy-net
    volumes:
      - app-logs:/app/logs
    restart: unless-stopped
    cap_drop:
      - ALL
    user: "1000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:latest
    container_name: swiftdeploy-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - swiftdeploy-net
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  app-logs: